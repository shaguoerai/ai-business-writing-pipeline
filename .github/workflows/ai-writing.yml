name: AI Writing Automation

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
    
    # Run every weekday at 8 AM UTC for daily content
    - cron: '0 8 * * 1-5'
  
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      content_type:
        description: 'Type of content to generate'
        required: true
        default: 'email'
        type: choice
        options:
        - email
        - proposal
        - report
        - social_media
      client_name:
        description: 'Client name (for proposals)'
        required: false
        type: string
      project_name:
        description: 'Project name'
        required: false
        type: string

jobs:
  generate-content:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install openai python-dotenv
        
    - name: Configure environment
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        # Create .env file if API key is provided
        if [ -n "$OPENAI_API_KEY" ]; then
          echo "OPENAI_API_KEY=$OPENAI_API_KEY" > .env
          echo "✅ OpenAI API key configured"
        else
          echo "⚠️  No OpenAI API key found. Using template mode only."
          echo "# Add your OpenAI API key to GitHub Secrets" > .env
          echo "# OPENAI_API_KEY=your_key_here" >> .env
        fi
        
    - name: Generate weekly report (Monday)
      if: github.event.schedule == '0 9 * * 1'
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        echo "📊 Generating weekly report..."
        python scripts/generate-content.py \
          --type report \
          --project-name "Weekly Business Review" \
          --period "weekly" \
          --progress "Completed client proposals,Updated documentation,Team meetings" \
          --accomplishments "Shipped v1.2,Onboarded 2 new clients,Improved workflow efficiency" \
          --challenges "API rate limiting,Team availability" \
          --next-priorities "Finalize Q2 planning,Update marketing materials,Client follow-ups" \
          --support-needed "Additional API credits,Design resources"
          
    - name: Generate daily content (Weekdays)
      if: github.event.schedule == '0 8 * * 1-5'
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        echo "📝 Generating daily content..."
        
        # Generate a professional email template
        python scripts/generate-content.py \
          --type email \
          --recipient "team@company.com" \
          --topic "Daily Standup Reminder" \
          --key-points "Today's priorities,Blockers to discuss,Action items"
          
        # Generate social media content
        echo "📱 Generating social media content..."
        date_today=$(date +%Y-%m-%d)
        echo "# Social Media Content for $date_today" > output/social_media_$date_today.md
        echo "" >> output/social_media_$date_today.md
        echo "## LinkedIn Post" >> output/social_media_$date_today.md
        echo "Sharing insights from this week's work on AI automation..." >> output/social_media_$date_today.md
        echo "" >> output/social_media_$date_today.md
        echo "## Twitter Thread" >> output/social_media_$date_today.md
        echo "1/ How we cut business writing time by 80% using AI..." >> output/social_media_$date_today.md
        
    - name: Handle manual trigger
      if: github.event_name == 'workflow_dispatch'
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        echo "🎯 Manual trigger: Generating ${{ github.event.inputs.content_type }}"
        
        case "${{ github.event.inputs.content_type }}" in
          email)
            python scripts/generate-content.py \
              --type email \
              --recipient "client@example.com" \
              --topic "Project Update" \
              --key-points "Progress update,Next steps,Questions"
            ;;
            
          proposal)
            if [ -z "${{ github.event.inputs.client_name }}" ]; then
              echo "❌ Client name required for proposal generation"
              exit 1
            fi
            
            python scripts/generate-content.py \
              --type proposal \
              --client "${{ github.event.inputs.client_name }}" \
              --project "${{ github.event.inputs.project_name || 'Website Development' }}" \
              --pain-points "Slow website, Poor user experience, Low conversion rates" \
              --budget "$15,000" \
              --deadline "2026-05-15"
            ;;
            
          report)
            python scripts/generate-content.py \
              --type report \
              --project-name "${{ github.event.inputs.project_name || 'Business Operations' }}" \
              --period "monthly" \
              --progress "Implemented new systems,Team training completed" \
              --accomplishments "Increased efficiency by 30%,Reduced errors by 25%" \
              --challenges "Learning curve for new tools" \
              --next-priorities "Optimize workflows,Expand team training" \
              --support-needed "Additional training resources"
            ;;
            
          social_media)
            echo "📱 Generating social media content pack..."
            date_today=$(date +%Y-%m-%d)
            
            cat > output/social_pack_$date_today.md << EOF
            # Social Media Content Pack - $date_today
            
            ## LinkedIn
            Just published a case study on how AI automation transformed our business writing workflow. 
            Key results: 80% time savings, consistent quality, scalable processes.
            
            ## Twitter Thread
            1/ Most businesses waste hours on writing tasks that AI could handle in minutes.
            
            2/ We built an automation pipeline that generates:
            - Client proposals
            - Progress reports  
            - Professional emails
            - Social media content
            
            3/ The result? Team members focus on strategy, not formatting.
            
            4/ Want to implement this for your team? Check out our GitHub template.
            
            ## Instagram
            From blank page to polished document in minutes ⚡
            
            Before: 3+ hours per proposal
            After: 15 minutes with AI assistance
            Result: More client wins, less burnout
            
            #AI #Automation #Productivity
            EOF
            
            echo "✅ Social media content pack generated"
            ;;
        esac
        
    - name: Archive generated content
      uses: actions/upload-artifact@v4
      with:
        name: generated-content-${{ github.run_id }}
        path: output/
        
    - name: Create summary
      run: |
        echo "📋 Content Generation Summary" >> $GITHUB_STEP_SUMMARY
        echo "=============================" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Workflow:** ${{ github.workflow }}" >> $GITHUB_STEP_SUMMARY
        echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
        echo "**Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "**Content Type:** ${{ github.event.inputs.content_type }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ github.event.inputs.client_name }}" ]; then
            echo "**Client:** ${{ github.event.inputs.client_name }}" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${{ github.event.inputs.project_name }}" ]; then
            echo "**Project:** ${{ github.event.inputs.project_name }}" >> $GITHUB_STEP_SUMMARY
          fi
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Generated Files" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -d "output" ]; then
          for file in output/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              echo "- \`$filename\`" >> $GITHUB_STEP_SUMMARY
            fi
          done
        else
          echo "No output files generated (check API key configuration)" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "1. Review generated content in the artifacts" >> $GITHUB_STEP_SUMMARY
        echo "2. Customize templates in the \`prompts/\` directory" >> $GITHUB_STEP_SUMMARY
        echo "3. Add your OpenAI API key to GitHub Secrets for full automation" >> $GITHUB_STEP_SUMMARY
        echo "4. Fork and customize for your specific needs" >> $GITHUB_STEP_SUMMARY